version: "3.8"

services:
  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spark Base (build only, not a running service) ────────────────────────────
  spark-base:
    build:
      context: ./docker/spark-base
    image: spark-base:3.5
    profiles: ["build"]   # only built, never started directly

  # ── Spark Master ──────────────────────────────────────────────────────────────
  spark-master:
    build:
      context: ./docker/spark-master
    image: spark-master:3.5
    container_name: spark-master
    depends_on:
      - spark-base
    ports:
      - "9090:8080"   # Spark Master UI
      - "7077:7077"   # Spark Master port
    environment:
      - SPARK_MODE=master
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
      - spark_logs:/opt/spark/logs

  # ── Spark Worker ──────────────────────────────────────────────────────────────
  spark-worker:
    build:
      context: ./docker/spark-worker
    image: spark-worker:3.5
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
      - spark_logs:/opt/spark/logs

  # ── Producer ──────────────────────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # ── Consumer (spark-submit) ───────────────────────────────────────────────────
  consumer:
    build:
      context: ./docker/spark-master   # reuse master image
    container_name: consumer
    depends_on:
      - spark-master
      - mongo
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGO_URI: mongodb://mongo:27017
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.mongodb.spark:mongo-spark-connector_2.12:10.3.0
      --conf spark.mongodb.write.connection.uri=mongodb://mongo:27017
      /opt/spark/work-dir/consumer/consumer.py

volumes:
  mongo_data:
  spark_logs:
