services:
  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    expose:
      - "9093"
    environment:
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "ecommerce-orders:1:1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spark Master ──────────────────────────────────────────────────────────────
  # spark-base:4.0 must be built manually before running this compose file:
  #   docker build -t spark-base:4.0 ./docker/spark-base
  spark-master:
    build:
      context: ./docker/spark-master
    image: spark-master:4.0
    container_name: spark-master
    ports:
      - "9090:8080" # Spark Master UI
      - "7077:7077" # Spark Master port
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
      - ./src:/opt/spark/work-dir/src
      - spark_logs:/opt/spark/logs

  # ── Spark Worker ──────────────────────────────────────────────────────────────
  spark-worker:
    build:
      context: ./docker/spark-worker
    image: spark-worker:4.0
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
      - ./src:/opt/spark/work-dir/src
      - spark_logs:/opt/spark/logs

  # ── Jupyter Notebook ──────────────────────────────────────────────────────────
  # Producer runs from inside this container:
  #   docker exec -it spark-notebook /bin/bash
  #   python3 /opt/spark/work-dir/src/producers/producer.py --broker kafka:9093 --topic ecommerce-orders --records 5000
  spark-notebook:
    image: spark-base:4.0
    container_name: spark-notebook
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    depends_on:
      - spark-worker
    ports:
      - "8888:8888"
      - "4040:4040" # Spark App UI (active while a job runs)
    env_file:
      - .env
    volumes:
      - ./consumer:/opt/spark/work-dir/consumer
      - ./src:/opt/spark/work-dir/src

volumes:
  mongo_data:
  spark_logs:
